version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: tablemanager-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-verysecurepassword}
      POSTGRES_DB: ${POSTGRES_DB:-tablemanager}
    volumes:
      - /mnt/user/appdata/table-manager/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    # Preferred: build backend from local source so the image contains built JS and entrypoint
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ghcr.io/cayn183/table-manager-backend:latest
    container_name: table-manager-backend
    environment:
      # Mark this service explicitly as backend for orchestrators/monitoring
      - SERVICE=backend
      # Prefer separate POSTGRES_* variables (fallback to DATABASE_URL supported)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-tm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-verysecurepassword}
      - POSTGRES_DB=${POSTGRES_DB:-tablemanager}
      - POSTGRES_SSL=${POSTGRES_SSL:-false}
      # Optional full DATABASE_URL (kept for backward compatibility)
      - DATABASE_URL=postgres://${POSTGRES_USER:-tm_user}:${POSTGRES_PASSWORD:-verysecurepassword}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-tablemanager}
      - JWT_SECRET=${JWT_SECRET:-replace_with_a_strong_secret}
      - NODE_ENV=production
      - MIGRATE_ON_START=true
      # Optional Sentry
      - SENTRY_DSN=${SENTRY_DSN}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE}
    depends_on:
      - postgres
    ports:
      - "4000:4000"
    # Mount only app data directory; avoid mounting over /app or /app/dist which would hide built files
    volumes:
      - /mnt/user/appdata/table-manager/backend-data:/app/data
    restart: unless-stopped

  # Optional one-shot migrate service: runs migrations once and exits (commented example)
  # migrate:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   image: ghcr.io/cayn183/table-manager-backend:latest
  #   command: ["/usr/local/bin/entrypoint.sh"]
  #   environment:
  #     - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
  #     - POSTGRES_PORT=${POSTGRES_PORT:-5432}
  #     - POSTGRES_USER=${POSTGRES_USER}
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
  #     - POSTGRES_DB=${POSTGRES_DB}
  #     - MIGRATE_ON_START=true
  #   depends_on:
  #     - postgres
  #   restart: "no"

  frontend:
    image: ghcr.io/cayn183/table-manager:latest
    container_name: table-manager-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:4000
      - VITE_SENTRY_DSN=${VITE_SENTRY_DSN}
    depends_on:
      - backend
    volumes:
      - /mnt/user/appdata/table-manager:/app/data
    restart: unless-stopped

# Notes:
# - Replace image names with build context / local images if you prefer to build from source on Unraid.
# - Ensure `JWT_SECRET` and `POSTGRES_PASSWORD` are set to secure values via the Unraid Docker UI or an env file.
# - You can also add an Adminer or pgAdmin service for DB management if desired.
