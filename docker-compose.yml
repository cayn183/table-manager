version: '3.8'

# Production-ready 2-Container setup for Table-Manager
# Backend: ghcr.io/cayn183/backend-table-manager
# Frontend: ghcr.io/cayn183/table-manager

services:
  postgres:
    image: postgres:15
    container_name: tablemanager-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-tablemanager}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tm_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/cayn183/backend-table-manager:latest
    container_name: table-manager-backend
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-tm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-tablemanager}
      - JWT_SECRET=${JWT_SECRET:-replace_with_a_strong_secret}
      - NODE_ENV=production
      - MIGRATE_ON_START=true
      # Logging: logs written to /app/data/backend.log
      - LOG_FILE=/app/data/backend.log
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      # Backend data and logs
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    image: ghcr.io/cayn183/table-manager:latest
    container_name: table-manager-frontend
    environment:
      # API URL must be accessible from browser (use external hostname in production)
      - VITE_API_URL=${VITE_API_URL:-http://localhost:4000}
      # Frontend preview server log level: info|warn|error|silent|debug
      - VITE_LOG_LEVEL=${VITE_LOG_LEVEL:-info}
    depends_on:
      - backend
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  postgres-data:
  backend-data:
