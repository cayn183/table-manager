version: '3.8'

# Production-ready 2-Container setup for Table-Manager
# Backend: ghcr.io/cayn183/backend-table-manager
# Frontend: ghcr.io/cayn183/table-manager

services:
  postgres:
    image: postgres:15
    container_name: tablemanager-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-tablemanager}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tm_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/cayn183/backend-table-manager:latest
    container_name: table-manager-backend
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-tm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-tablemanager}
      - JWT_SECRET=${JWT_SECRET:-replace_with_a_strong_secret}
      - NODE_ENV=production
      - MIGRATE_ON_START=true
      # CORS: set to your external frontend URL (comma-separated for multiple)
      # e.g. https://app.example.com or http://192.168.1.100:5173
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=/app/data/backend.log
      # Reverse proxy: trust first proxy hop (set to 'false' to disable)
      - TRUST_PROXY=${TRUST_PROXY:-1}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    image: ghcr.io/cayn183/table-manager:latest
    container_name: table-manager-frontend
    environment:
      # API URL as seen by the BROWSER (external URL, not Docker-internal)
      # e.g. https://api.example.com or http://192.168.1.100:4000
      - VITE_API_URL=${VITE_API_URL:-http://localhost:4000}
      # Log level for Vite preview server (info|warn|error|silent|debug)
      - VITE_LOG_LEVEL=${VITE_LOG_LEVEL:-info}
      # Allowed hostnames for reverse proxy (comma-separated, or '*' for all)
      - VITE_PREVIEW_ALLOWED_HOSTS=${VITE_PREVIEW_ALLOWED_HOSTS:-*}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres-data:
  backend-data:
