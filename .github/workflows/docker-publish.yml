name: Docker Build and Push

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync version (pre-build)
        id: sync_version
        run: |
          set -euo pipefail
          VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/') || VERSION=""
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          RELEASE_DATE=$(date +%Y-%m-%d)

          if grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "✓ Version [$VERSION] already in CHANGELOG"
          else
            awk -v ver="$VERSION" -v date="$RELEASE_DATE" '
              BEGIN{inserted=0}
              /^## \[Unreleased\]/ && !inserted {
                print
                print ""
                print "## [" ver "] - " date
                print ""
                print "### Changed"
                print "- Development version"
                print ""
                inserted=1
                next
              }
              { print }
            ' CHANGELOG.md > CHANGELOG.md.tmp && mv CHANGELOG.md.tmp CHANGELOG.md
            echo "✓ Updated CHANGELOG.md with version [$VERSION]"
          fi

          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "⚠ No changes to commit"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md
            git commit -m "chore: sync version to $VERSION [skip ci]" || true
            BRANCH="${GITHUB_REF##*/}"
            git push origin "HEAD:${BRANCH}"
            echo "✓ Committed and pushed changelog"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo $IMAGE | tr '[:upper:]' '[:lower:]')
          SHA="${GITHUB_SHA::7}"
          REF_NAME="${GITHUB_REF##*/}"
          TAGS=""
          if [[ "${GITHUB_REF}" == refs/heads/dev ]]; then
            TAGS="$IMAGE:dev-$SHA $IMAGE:dev-latest"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            VERSION=$(node -p "require('./package.json').version")
            TAGS="$IMAGE:latest $IMAGE:v$VERSION $IMAGE:sha-$SHA"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAGS="$IMAGE:${REF_NAME} $IMAGE:latest"
          fi
          # compute BUILD_VERSION for the build args
          BUILD_VERSION=""
          if [[ "${GITHUB_REF}" == refs/heads/dev ]]; then
            BUILD_VERSION="DEV"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            BUILD_VERSION="$VERSION"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # strip leading 'v' from tag
            BUILD_VERSION="${REF_NAME#v}"
          fi
          if [[ -z "$TAGS" ]]; then
            echo "No tags computed; exiting." >&2
            exit 1
          fi
          echo "tags=$(echo $TAGS | tr ' ' ',')" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            BUILD_SHA=${{ steps.tags.outputs.short_sha }}
            BUILD_VERSION=${{ steps.tags.outputs.build_version }}
          platforms: linux/amd64,linux/arm64
          # Disabled cache backend causing buildx errors on runners.
          # cache-from: type=gha
          # cache-to: type=gha,mode=max
