name: Docker Build and Push

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  sync-version:
    runs-on: ubuntu-latest
    outputs:
      pushed_sha: ${{ steps.set_sha.outputs.pushed_sha }}
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✓ Extracted version: $VERSION"

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_DATE=$(date +%Y-%m-%d)

          if grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "✓ Version [$VERSION] already in CHANGELOG"
          else
            awk -v ver="$VERSION" -v date="$RELEASE_DATE" '
              BEGIN{inserted=0}
              /^## \[Unreleased\]/ && !inserted {
                print
                print ""
                print "## [" ver "] - " date
                print ""
                print "### Changed"
                print "- Development version"
                print ""
                inserted=1
                next
              }
              { print }
            ' CHANGELOG.md > CHANGELOG.md.tmp && mv CHANGELOG.md.tmp CHANGELOG.md
            echo "✓ Updated CHANGELOG.md with version [$VERSION]"
          fi

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "⚠ No changes to commit"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✓ Changes detected and ready to commit"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: sync version to ${{ steps.version.outputs.version }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:refs/heads/${GITHUB_REF#refs/heads/}

      - name: Set pushed SHA output
        id: set_sha
        run: |
          # capture the pushed commit short SHA (local HEAD)
          echo "pushed_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  build-and-push:
    runs-on: ubuntu-latest
    needs: sync-version
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use sync-version pushed commit if available
        if: needs.sync-version.outputs.pushed_sha != ''
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "Fetching origin/$BRANCH_NAME"
          git fetch origin $BRANCH_NAME
          git reset --hard origin/$BRANCH_NAME

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo $IMAGE | tr '[:upper:]' '[:lower:]')
          SHA="${GITHUB_SHA::7}"
          REF_NAME="${GITHUB_REF##*/}"
          TAGS=""
          if [[ "${GITHUB_REF}" == refs/heads/dev ]]; then
            TAGS="$IMAGE:dev-$SHA $IMAGE:dev-latest"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            VERSION=$(node -p "require('./package.json').version")
            TAGS="$IMAGE:latest $IMAGE:v$VERSION $IMAGE:sha-$SHA"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAGS="$IMAGE:${REF_NAME} $IMAGE:latest"
          fi
          # compute BUILD_VERSION for the build args
          BUILD_VERSION=""
          if [[ "${GITHUB_REF}" == refs/heads/dev ]]; then
            BUILD_VERSION="DEV"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            BUILD_VERSION="$VERSION"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # strip leading 'v' from tag
            BUILD_VERSION="${REF_NAME#v}"
          fi
          if [[ -z "$TAGS" ]]; then
            echo "No tags computed; exiting." >&2
            exit 1
          fi
          echo "tags=$(echo $TAGS | tr ' ' ',')" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            BUILD_SHA=${{ steps.tags.outputs.short_sha }}
            BUILD_VERSION=${{ steps.tags.outputs.build_version }}
          platforms: linux/amd64,linux/arm64
          # Disabled cache backend causing buildx errors on runners.
          # cache-from: type=gha
          # cache-to: type=gha,mode=max
