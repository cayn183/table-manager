name: Version & Release Management

on:
  push:
    branches:
      - dev
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '!CHANGELOG.md'

jobs:
  version-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Get commit messages since last release
        id: commits
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" --no-merges | grep -v "Merge " | grep -v "\[skip ci\]" || echo "")
          else
            COMMITS=$(git log $LAST_TAG..HEAD --pretty=format:"%s" --no-merges | grep -v "Merge " | grep -v "\[skip ci\]" || echo "")
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
      
      - name: Check if skip release
        id: skip_check
        run: |
          COMMITS="${{ steps.commits.outputs.commits }}"
          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️  No commits found since last release. Skipping version bump."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Determine version bump
        if: steps.skip_check.outputs.skip == 'false'
        id: version
        run: |
          CURRENT_VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          COMMITS="${{ steps.commits.outputs.commits }}"
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          
          if echo "$COMMITS" | grep -qi "breaking\|^BREAKING"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            BUMP_TYPE="major"
          elif echo "$COMMITS" | grep -qi "^feat:"; then
            MINOR=$((MINOR + 1))
            PATCH=0
            BUMP_TYPE="minor"
          else
            PATCH=$((PATCH + 1))
            BUMP_TYPE="patch"
          fi
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "old_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          
          echo "📦 Version bump: $CURRENT_VERSION → $NEW_VERSION ($BUMP_TYPE)"
      
      - name: Check if version already exists
        run: |
          if git rev-parse "v${{ steps.version.outputs.new_version }}" >/dev/null 2>&1; then
            echo "⚠️ Tag v${{ steps.version.outputs.new_version }} already exists. Skipping release."
            exit 0
          fi
      
      - name: Update package.json
        run: |
          sed -i 's/"version": "[^"]*"/"version": "${{ steps.version.outputs.new_version }}"/' package.json
      
      - name: Update Footer component
        run: |
          RELEASE_DATE=$(date +%Y-%m-%d)
          sed -i "s/version: '[^']*'/version: '${{ steps.version.outputs.new_version }}'/" src/components/Footer.tsx
          sed -i "s/releaseDate: '[^']*'/releaseDate: '$RELEASE_DATE'/" src/components/Footer.tsx
      
      - name: Update README badge
        run: |
          sed -i "s/version-[0-9.]*-blue/version-${{ steps.version.outputs.new_version }}-blue/" README.md
      
      - name: Generate changelog entry
        id: changelog_entry
        run: |
          RELEASE_DATE=$(date +%Y-%m-%d)
          COMMITS="${{ steps.commits.outputs.commits }}"
          
          # Categorize commits
          TEMP_FILE=$(mktemp)
          echo "## [${{ steps.version.outputs.new_version }}] - $RELEASE_DATE" > $TEMP_FILE
          echo "" >> $TEMP_FILE
          
          # Added features
          FEATURES=$(echo "$COMMITS" | grep -i "^feat:" | sed 's/^feat: /- /' || true)
          if [ -n "$FEATURES" ]; then
            echo "### Added" >> $TEMP_FILE
            echo "$FEATURES" >> $TEMP_FILE
            echo "" >> $TEMP_FILE
          fi
          
          # Fixed bugs
          FIXES=$(echo "$COMMITS" | grep -i "^fix:" | sed 's/^fix: /- /' || true)
          if [ -n "$FIXES" ]; then
            echo "### Fixed" >> $TEMP_FILE
            echo "$FIXES" >> $TEMP_FILE
            echo "" >> $TEMP_FILE
          fi
          
          # Documentation
          DOCS=$(echo "$COMMITS" | grep -i "^docs:" | sed 's/^docs: /- /' || true)
          if [ -n "$DOCS" ]; then
            echo "### Changed" >> $TEMP_FILE
            echo "$DOCS" >> $TEMP_FILE
            echo "" >> $TEMP_FILE
          fi
          
          # Other changes
          OTHER=$(echo "$COMMITS" | grep -vi "^feat:\|^fix:\|^docs:\|^chore:\|\[skip ci\]" || true)
          if [ -n "$OTHER" ]; then
            echo "### Changed" >> $TEMP_FILE
            echo "$OTHER" | sed 's/^/- /' >> $TEMP_FILE
            echo "" >> $TEMP_FILE
          fi
          
          # Save file path for later use
          echo "entry_file=$TEMP_FILE" >> $GITHUB_OUTPUT
      
      - name: Update CHANGELOG.md
        run: |
          TEMP_CHANGELOG=$(mktemp)
          ENTRY_FILE="${{ steps.changelog_entry.outputs.entry_file }}"
          
          # Write header
          echo "# Changelog" > $TEMP_CHANGELOG
          echo "" >> $TEMP_CHANGELOG
          echo "Alle bemerkenswerten Änderungen an diesem Projekt werden in dieser Datei dokumentiert." >> $TEMP_CHANGELOG
          echo "" >> $TEMP_CHANGELOG
          echo "Das Format basiert auf [Keep a Changelog](https://keepachangelog.com/de/1.0.0/)," >> $TEMP_CHANGELOG
          echo "und dieses Projekt folgt [Semantic Versioning](https://semver.org/lang/de/)." >> $TEMP_CHANGELOG
          echo "" >> $TEMP_CHANGELOG
          echo "## [Unreleased]" >> $TEMP_CHANGELOG
          echo "" >> $TEMP_CHANGELOG
          
          # Add new release
          cat $ENTRY_FILE >> $TEMP_CHANGELOG
          
          # Append old releases (skip header and unreleased section)
          awk '/^## \[[0-9]/ {found=1} found' CHANGELOG.md >> $TEMP_CHANGELOG 2>/dev/null || true
          
          mv $TEMP_CHANGELOG CHANGELOG.md
      
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "⚠️ No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected"
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src/components/Footer.tsx CHANGELOG.md README.md
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]"
          git push
      
      - name: Create and push tag
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git tag -a "v${{ steps.version.outputs.new_version }}" -m "Release ${{ steps.version.outputs.new_version }}"
          git push origin "v${{ steps.version.outputs.new_version }}"
      
      - name: Create GitHub Release
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: Release ${{ steps.version.outputs.new_version }}
          body_path: ${{ steps.changelog_entry.outputs.entry_file }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
