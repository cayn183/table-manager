name: Create Release on Tags

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3). Leave empty to use package.json'
        required: false
        default: ''

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Determine version and tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          else
            INPUT_VERSION="${{ github.event.inputs.version }}"
            if [[ -n "$INPUT_VERSION" ]]; then
              VERSION="$INPUT_VERSION"
            else
              VERSION=$(node -p "require('./package.json').version")
            fi
            TAG="v$VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "skip_release=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists; skipping release."
          else
            echo "skip_release=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create GitHub Release
        if: steps.check_tag.outputs.skip_release != 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ steps.version.outputs.tag }}/CHANGELOG.md) for detailed release notes.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
