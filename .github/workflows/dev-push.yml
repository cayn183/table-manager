name: Dev Build & Push

on:
  push:
    branches:
      - dev

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get short SHA
        id: sha
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "✓ Short SHA: $SHORT_SHA"

      - name: Update Frontend version (Footer.tsx)
        run: |
          RELEASE_DATE=$(date +%Y-%m-%d)
          # Set version to 'dev' and update release date
          sed -i "s/version: '[^']*'/version: 'dev'/" src/components/Footer.tsx
          sed -i "s/releaseDate: '[^']*'/releaseDate: '$RELEASE_DATE'/" src/components/Footer.tsx
          echo "✓ Updated Frontend Footer.tsx: version='dev', releaseDate='$RELEASE_DATE'"

      - name: Update Backend version (package.json)
        run: |
          # Set backend version to 'dev' indicator
          cd backend
          npm version 0.0.0-dev --no-git-tag-version --allow-same-version || true
          echo "✓ Updated Backend package.json version to dev"

      - name: Commit version changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes to commit
          if ! git diff --quiet; then
            git add src/components/Footer.tsx backend/package.json
            git commit -m "chore: set dev version [skip ci]"
            git push
            echo "✓ Version changes committed"
          else
            echo "⚠ No version changes needed"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute Docker tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo $IMAGE | tr '[:upper:]' '[:lower:]')
          SHORT_SHA="${{ steps.sha.outputs.short }}"
          
          TAGS="$IMAGE:dev,$IMAGE:dev-$SHORT_SHA,$IMAGE:dev-latest"
          
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "✓ Docker tags: $TAGS"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            BUILD_SHA=${{ steps.sha.outputs.short }}
            BUILD_VERSION=dev
          platforms: linux/amd64,linux/arm64
