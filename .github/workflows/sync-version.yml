name: Sync Version to Components

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'package.json'
  workflow_dispatch: {}
  workflow_run:
    workflows:
      - 'Docker Build and Push'
    types:
      - completed

jobs:
  sync-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✓ Extracted version: $VERSION"
      
      # Footer is built with VITE_BUILD_VERSION/VITE_BUILD_SHA at build time
      # and no longer contains a static VERSION_INFO. We skip editing it here.
      
      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_DATE=$(date +%Y-%m-%d)

          # Check if version already exists in CHANGELOG
          if grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "✓ Version [$VERSION] already in CHANGELOG"
          else
            # Insert new version section after the '## [Unreleased]' header (robust to header length)
            awk -v ver="$VERSION" -v date="$RELEASE_DATE" '
              BEGIN{inserted=0}
              /^## \[Unreleased\]/ && !inserted {
                print
                print ""
                print "## [" ver "] - " date
                print ""
                print "### Changed"
                print "- Development version"
                print ""
                inserted=1
                next
              }
              { print }
            ' CHANGELOG.md > CHANGELOG.md.tmp && mv CHANGELOG.md.tmp CHANGELOG.md
            echo "✓ Updated CHANGELOG.md with version [$VERSION]"
          fi
      
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "⚠ No changes to commit"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✓ Changes detected and ready to commit"
          fi
      
      - name: Commit changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: sync version to ${{ steps.version.outputs.version }} [skip ci]" || echo "No changes to commit"

      # Debug step removed to avoid YAML parsing issues in some linters

      - name: Upload changelog artifact
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG.md

      - name: Create issue with changelog
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: actions/github-script@v6
        env:
          VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('CHANGELOG.md','utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `changelog: sync version ${process.env.VERSION}`,
              body
            });
